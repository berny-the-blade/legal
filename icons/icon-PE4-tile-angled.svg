<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- PE4: Correct flag (yellow star), BIG tile at -18° angle.
       Diagonal placement adds energy / motion. -->
  <defs>
    <linearGradient id="bluePE4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a5cb0"/><stop offset="100%" stop-color="#0d3b78"/>
    </linearGradient>
    <linearGradient id="tilePE4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf6e3"/><stop offset="100%" stop-color="#ede1c3"/>
    </linearGradient>
    <filter id="tShadow4" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/><feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.7"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip4"><rect width="512" height="512" rx="100" ry="100"/></clipPath>
  </defs>

  <g clip-path="url(#clip4)">
    <rect width="512" height="320" fill="url(#bluePE4)"/>
    <rect y="320" width="512" height="192" fill="#f4ecd8"/>
    <g fill="none">
      <path d="M 41 320 A 215 215 0 0 1 471 320" stroke="#d23535" stroke-width="22"/>
      <path d="M 63 320 A 193 193 0 0 1 449 320" stroke="#f5cf5b" stroke-width="22"/>
      <path d="M 85 320 A 171 171 0 0 1 427 320" stroke="#5fa05f" stroke-width="22"/>
    </g>
    <circle cx="256" cy="295" r="60" fill="#f5cf5b" stroke="#a8842e" stroke-width="3"/>
    <g transform="translate(256 60)">
      <polygon points="0,-36 11,-11 38,-11 17,6 24,32 0,17 -24,32 -17,6 -38,-11 -11,-11"
               fill="#f5cf5b" stroke="#a8842e" stroke-width="2"/>
    </g>
    <g fill="#c83737" stroke="#8a2828" stroke-width="2">
      <rect x="244" y="356" width="24" height="120" rx="2"/>
      <rect x="208" y="392" width="96" height="24" rx="2"/>
    </g>
  </g>

  <!-- Big tile rotated -18° -->
  <g transform="translate(256 320) rotate(-18)" filter="url(#tShadow4)">
    <rect x="-205" y="-102" width="410" height="204" rx="18" ry="18" fill="url(#tilePE4)" stroke="#bda06a" stroke-width="3"/>
    <line x1="0" y1="-80" x2="0" y2="80" stroke="#1c1c1c" stroke-width="3.5" stroke-linecap="round"/>
    <g fill="#1c1c1c">
      <circle cx="-158" cy="-60" r="13"/><circle cx="-158" cy="0" r="13"/><circle cx="-158" cy="60" r="13"/>
      <circle cx="-64" cy="-60" r="13"/><circle cx="-64" cy="0" r="13"/><circle cx="-64" cy="60" r="13"/>
    </g>
    <g fill="#1c1c1c">
      <circle cx="64" cy="-60" r="13"/><circle cx="64" cy="0" r="13"/><circle cx="64" cy="60" r="13"/>
      <circle cx="158" cy="-60" r="13"/><circle cx="158" cy="0" r="13"/><circle cx="158" cy="60" r="13"/>
    </g>
  </g>
</svg>
