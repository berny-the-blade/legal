<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept F: Same idea as E but the flag is BOLD and the tile is smaller.
       Star is large and prominent above the tile. For Pernambucanos this
       reads "Pernambuco domino" instantly — no ambiguity. Bolder, louder. -->

  <defs>
    <linearGradient id="redF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d23535"/>
      <stop offset="100%" stop-color="#a52525"/>
    </linearGradient>
    <linearGradient id="blueF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f4f96"/>
      <stop offset="100%" stop-color="#13325f"/>
    </linearGradient>
    <linearGradient id="tileGradF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf6e3"/>
      <stop offset="100%" stop-color="#ede1c3"/>
    </linearGradient>
    <filter id="tileShadowF" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.6"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="iconClipF">
      <rect width="512" height="512" rx="100" ry="100"/>
    </clipPath>
  </defs>

  <g clip-path="url(#iconClipF)">
    <!-- Red top -->
    <rect width="512" height="220" fill="url(#redF)"/>
    <!-- Blue bottom -->
    <rect y="220" width="512" height="292" fill="url(#blueF)"/>
    <!-- Strong white arc -->
    <path d="M 0 250 Q 256 165 512 250 L 512 195 Q 256 115 0 195 Z" fill="#f4ecd8"/>
    <!-- Big yellow star prominent at top -->
    <g transform="translate(256 130)">
      <polygon points="0,-58 17,-19 60,-19 26,9 38,50 0,28 -38,50 -26,9 -60,-19 -17,-19"
               fill="#f5cf5b" stroke="#8a6a26" stroke-width="3"/>
    </g>
  </g>

  <!-- Tile, smaller, sits in the blue lower half -->
  <g transform="translate(256 360) rotate(-3)" filter="url(#tileShadowF)">
    <rect x="-150" y="-75" width="300" height="150" rx="14" ry="14" fill="url(#tileGradF)" stroke="#bda06a" stroke-width="2"/>
    <line x1="0" y1="-58" x2="0" y2="58" stroke="#1c1c1c" stroke-width="3" stroke-linecap="round"/>
    <!-- Left: 6 pips -->
    <g fill="#1c1c1c">
      <circle cx="-115" cy="-42" r="10"/><circle cx="-115" cy="0" r="10"/><circle cx="-115" cy="42" r="10"/>
      <circle cx="-45" cy="-42" r="10"/><circle cx="-45" cy="0" r="10"/><circle cx="-45" cy="42" r="10"/>
    </g>
    <!-- Right: 6 pips -->
    <g fill="#1c1c1c">
      <circle cx="45" cy="-42" r="10"/><circle cx="45" cy="0" r="10"/><circle cx="45" cy="42" r="10"/>
      <circle cx="115" cy="-42" r="10"/><circle cx="115" cy="0" r="10"/><circle cx="115" cy="42" r="10"/>
    </g>
  </g>
</svg>
