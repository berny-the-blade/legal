<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept D: Single tile over a subtle Brazilian-color stripe.
       Modern but timeless, broader Brazilian appeal beyond just Pernambuco. -->

  <defs>
    <radialGradient id="bgGradD" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#216042"/>
      <stop offset="100%" stop-color="#143a2c"/>
    </radialGradient>
    <linearGradient id="tileGradD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf6e3"/>
      <stop offset="100%" stop-color="#ede1c3"/>
    </linearGradient>
    <filter id="tileShadowD" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="7"/>
      <feOffset dx="0" dy="7"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="100" ry="100" fill="url(#bgGradD)"/>

  <!-- Diagonal Brazilian-color stripe (yellow over green base), subtle -->
  <g opacity="0.22">
    <polygon points="0,170 0,260 512,260 512,170" fill="#f4d35e"/>
    <polygon points="0,260 0,350 512,350 512,260" fill="#7fb069"/>
  </g>

  <!-- Tile [5|2] horizontal, centered -->
  <g transform="translate(256 256) rotate(-4)" filter="url(#tileShadowD)">
    <rect x="-170" y="-85" width="340" height="170" rx="14" ry="14" fill="url(#tileGradD)" stroke="#bda06a" stroke-width="2"/>
    <line x1="0" y1="-65" x2="0" y2="65" stroke="#1c1c1c" stroke-width="3" stroke-linecap="round"/>

    <!-- Left half: 5 pips -->
    <g fill="#1c1c1c">
      <circle cx="-130" cy="-50" r="11"/>
      <circle cx="-50" cy="-50" r="11"/>
      <circle cx="-90" cy="0" r="11"/>
      <circle cx="-130" cy="50" r="11"/>
      <circle cx="-50" cy="50" r="11"/>
    </g>
    <!-- Right half: 2 pips -->
    <g fill="#1c1c1c">
      <circle cx="50" cy="-50" r="11"/>
      <circle cx="130" cy="50" r="11"/>
    </g>
  </g>

  <!-- Subtle brass corner ornament bottom-right -->
  <g transform="translate(440 440)" opacity="0.75">
    <circle r="14" fill="#d4b269"/>
    <circle r="6" fill="#8e6e3a"/>
  </g>
</svg>
