<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept E: Tile centered over a SUBTLE Pernambuco-flag-inspired backdrop.
       Red + blue color blocks, curved white arc, yellow star — all faded so
       the tile stays the primary subject. Pernambucanos recognize the flag
       under the tile; others just see a rich background. -->

  <defs>
    <linearGradient id="redE" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c83737"/>
      <stop offset="100%" stop-color="#9a2727"/>
    </linearGradient>
    <linearGradient id="blueE" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e4a8a"/>
      <stop offset="100%" stop-color="#13325f"/>
    </linearGradient>
    <linearGradient id="tileGradE" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf6e3"/>
      <stop offset="100%" stop-color="#ede1c3"/>
    </linearGradient>
    <filter id="tileShadowE" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="9"/>
      <feOffset dx="0" dy="9"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="iconClipE">
      <rect width="512" height="512" rx="100" ry="100"/>
    </clipPath>
  </defs>

  <g clip-path="url(#iconClipE)">
    <!-- Pernambuco flag elements as background -->
    <!-- Red top half -->
    <rect width="512" height="256" fill="url(#redE)"/>
    <!-- Blue bottom half -->
    <rect y="256" width="512" height="256" fill="url(#blueE)"/>
    <!-- White curved arc (rainbow) between the two -->
    <path d="M 0 280 Q 256 200 512 280 L 512 232 Q 256 152 0 232 Z" fill="#f4ecd8" opacity="0.92"/>
    <!-- Yellow star above the arc, centered -->
    <g transform="translate(256 195)">
      <polygon points="0,-44 13,-14 46,-14 19,8 29,38 0,21 -29,38 -19,8 -46,-14 -13,-14"
               fill="#f5cf5b" stroke="#a8842e" stroke-width="2"/>
    </g>
    <!-- Cross / sun rays element below arc (simplified) -->
    <g transform="translate(256 360)" opacity="0.65" fill="none" stroke="#f4ecd8" stroke-width="3">
      <line x1="-32" y1="0" x2="32" y2="0"/>
      <line x1="0" y1="-32" x2="0" y2="32"/>
      <line x1="-22" y1="-22" x2="22" y2="22"/>
      <line x1="-22" y1="22" x2="22" y2="-22"/>
    </g>
  </g>

  <!-- Domino tile on top -->
  <g transform="translate(256 290) rotate(-4)" filter="url(#tileShadowE)">
    <rect x="-175" y="-88" width="350" height="176" rx="16" ry="16" fill="url(#tileGradE)" stroke="#bda06a" stroke-width="2"/>
    <line x1="0" y1="-66" x2="0" y2="66" stroke="#1c1c1c" stroke-width="3" stroke-linecap="round"/>
    <!-- Left: 6 pips -->
    <g fill="#1c1c1c">
      <circle cx="-133" cy="-50" r="11"/><circle cx="-133" cy="0" r="11"/><circle cx="-133" cy="50" r="11"/>
      <circle cx="-53" cy="-50" r="11"/><circle cx="-53" cy="0" r="11"/><circle cx="-53" cy="50" r="11"/>
    </g>
    <!-- Right: 6 pips -->
    <g fill="#1c1c1c">
      <circle cx="53" cy="-50" r="11"/><circle cx="53" cy="0" r="11"/><circle cx="53" cy="50" r="11"/>
      <circle cx="133" cy="-50" r="11"/><circle cx="133" cy="0" r="11"/><circle cx="133" cy="50" r="11"/>
    </g>
  </g>
</svg>
